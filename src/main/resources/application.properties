# ============================================================
# Reservation FrontOffice - Configuration
# ============================================================

# Application
spring.application.name=reservation-frontoffice
server.port=8080

# PostgreSQL (même base que le backoffice)
spring.datasource.url=jdbc:postgresql://localhost:5432/reservation_voiture
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.reservation=DEBUG
